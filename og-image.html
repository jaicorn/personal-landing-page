<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 1200px; height: 630px; overflow: hidden; }
        .card {
            width: 1200px;
            height: 630px;
            background: #09090b;
            display: flex;
            align-items: center;
            padding: 0 80px;
            gap: 60px;
            font-family: -apple-system, 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #c4a24e 0%, rgba(196,162,78,0.2) 60%, transparent 100%);
        }
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(196,162,78,0.04) 0%, transparent 60%);
        }
        .photo {
            width: 220px;
            height: 280px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            z-index: 1;
        }
        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: grayscale(15%) contrast(1.05);
        }
        .text {
            position: relative;
            z-index: 1;
        }
        .name {
            font-size: 52px;
            font-weight: 700;
            color: #f4f4f6;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        .title {
            font-size: 22px;
            font-weight: 300;
            color: #a1a1b0;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        .stats {
            display: flex;
            gap: 40px;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 24px;
        }
        .stat-num {
            font-size: 24px;
            font-weight: 700;
            color: #f4f4f6;
            letter-spacing: -0.5px;
        }
        .stat-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #6a6a7e;
            margin-top: 2px;
        }
        .url {
            position: absolute;
            bottom: 36px;
            right: 80px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #c4a24e;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo">
            <img src="headshot.jpg" alt="Justin Corneliusen">
        </div>
        <div class="text">
            <div class="name">Justin<br>Corneliusen</div>
            <div class="title">Senior Business and Strategy Analyst</div>
            <div class="stats">
                <div>
                    <div class="stat-num">1,000+</div>
                    <div class="stat-label">Businesses</div>
                </div>
                <div>
                    <div class="stat-num">49</div>
                    <div class="stat-label">States</div>
                </div>
                <div>
                    <div class="stat-num">$1M–500M</div>
                    <div class="stat-label">Client Revenue</div>
                </div>
            </div>
        </div>
        <div class="url">justincorn.com</div>
    </div>
</body>
</html>
